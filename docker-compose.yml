services:
  propertyfinder:
    build: .
    container_name: scraper-propertyfinder
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - MONGO_PROPERTYFINDER_DB=${MONGO_PROPERTYFINDER_DB:-propertyfinder}
      - MONGO_PROPERTYFINDER_COL=${MONGO_PROPERTYFINDER_COL:-locations}
      - MONGO_PROPERTYFINDER_COL_CLEAN=${MONGO_PROPERTYFINDER_COL_CLEAN:-locations_clean}
      - POSTGRES_DSN=${POSTGRES_DSN}
      - PG_TABLE_PROPERTYFINDER=${PG_TABLE_PROPERTYFINDER:-propertyfinder_listings}
      - PG_ARCHIVE_PROPERTYFINDER=${PG_ARCHIVE_PROPERTYFINDER:-propertyfinder_archive}
      - BATCH_SIZE=${BATCH_SIZE:-500}
      - CYCLE_SLEEP=${CYCLE_SLEEP:-86400}
      - B2_KEY_ID=${B2_KEY_ID}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
      - B2_ENDPOINT=${B2_ENDPOINT:-https://s3.us-east-005.backblazeb2.com}
      - B2_BUCKET=${B2_BUCKET:-immo-world}
    volumes:
      - ./logs:/app/logs
